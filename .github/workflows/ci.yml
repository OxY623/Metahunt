name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      # Одноразовая PostgreSQL БД для CI. Она живет только внутри runner'а и удаляется после job.
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: metahunt_ci
          POSTGRES_USER: metahunt
          POSTGRES_PASSWORD: metahunt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U metahunt -d metahunt_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Отключаем телеметрию в CI, чтобы логи были чище и сборки не зависели от лишних сетевых запросов.
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      TURBO_TELEMETRY_DISABLED: 1
      # Это не production-секреты, а временные значения для тестового окружения GitHub Actions.
      DATABASE_URL: postgresql+asyncpg://metahunt:metahunt@localhost:5432/metahunt_ci
      SECRET_KEY: ci-only-secret-key
      ALGORITHM: HS256
      # Если понадобится удаленный кеш Turborepo, раскомментируй эти строки и добавь секреты в GitHub.
      # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      # TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # pnpm должен совпадать с packageManager в package.json, иначе lockfile может читаться по-разному.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      # Backend в apps/api тестируется через pytest, поэтому на runner нужен Python и pip-зависимости.
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pytest и alembic не лежат в runtime requirements, поэтому ставим их отдельно только для CI.
      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt alembic pytest

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Check types
        run: pnpm check-types
        continue-on-error: true

      # У документации скрипт называется typecheck, а не check-types, поэтому запускаем его отдельно.
      - name: Check docs types
        run: pnpm --filter apps-docs typecheck

      - name: Build
        run: pnpm build

      - name: Run API migrations
        # Проверяем, что схема БД накатывается на чистый PostgreSQL так же, как это будет на новом окружении.
        run: |
          cd apps/api
          python -m alembic upgrade head

      - name: Test
        run: pnpm test
