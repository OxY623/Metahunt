<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040612"/>
      <stop offset="0.55" stop-color="#0B0F1A"/>
      <stop offset="1" stop-color="#11061E"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg5)"/>

  <!-- City -->
  <path d="M0 720 L0 900 L1600 900 L1600 740 L1480 740 L1480 640 L1380 640 L1380 780 L1230 780 L1230 610 L1140 610 L1140 820 L980 820 L980 650 L900 650 L900 850 L720 850 L720 690 L650 690 L650 870 L460 870 L460 650 L400 650 L400 890 L220 890 L220 690 L160 690 L160 900 L0 900 Z" fill="#030611"/>

  <!-- Anomalies -->
  <g filter="url(#glow)" opacity="0.9">
    <circle cx="420" cy="360" r="22" fill="#FF3AF2" fill-opacity="0.22"/>
    <circle cx="520" cy="420" r="18" fill="#00F0FF" fill-opacity="0.18"/>
    <circle cx="980" cy="340" r="26" fill="#00F0FF" fill-opacity="0.18"/>
    <circle cx="1110" cy="420" r="20" fill="#FF3AF2" fill-opacity="0.2"/>
    <path d="M420 360 L520 420 L980 340 L1110 420" fill="none" stroke="#00F0FF" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <!-- Label -->
  <g font-family="JetBrains Mono, monospace" font-size="40" filter="url(#glow)">
    <text x="560" y="240" fill="#00F0FF" fill-opacity="0.8">SHARDS DETECTED</text>
  </g>

  <!-- Glitch tiles -->
  <g opacity="0.22">
    <rect x="260" y="500" width="180" height="14" fill="#FF3AF2"/>
    <rect x="1040" y="520" width="220" height="10" fill="#00F0FF"/>
    <rect x="760" y="560" width="260" height="12" fill="#FF3AF2"/>
  </g>
</svg>
