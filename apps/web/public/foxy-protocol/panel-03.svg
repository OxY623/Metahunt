<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040614"/>
      <stop offset="0.55" stop-color="#0B0F1A"/>
      <stop offset="1" stop-color="#1B0A24"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>

  <!-- Terminal -->
  <rect x="180" y="170" width="1240" height="560" rx="26" fill="#060B16" stroke="#222B45" stroke-width="2"/>
  <rect x="220" y="220" width="1160" height="460" rx="18" fill="#0B0F1A" stroke="#FF3AF2" stroke-opacity="0.25"/>

  <g font-family="JetBrains Mono, monospace" font-size="36" filter="url(#glow)">
    <text x="290" y="320" fill="#00F0FF" fill-opacity="0.85">META CORE ACCESS</text>
    <text x="290" y="400" fill="#FF3AF2" fill-opacity="0.85">SEED PHRASE DETECTED</text>
  </g>

  <!-- Orange eyes hint -->
  <g filter="url(#glow)" opacity="0.9">
    <circle cx="1190" cy="570" r="10" fill="#FF8A00" fill-opacity="0.65"/>
    <circle cx="1230" cy="570" r="10" fill="#FF8A00" fill-opacity="0.65"/>
    <path d="M1170 600 C1190 620, 1230 620, 1250 600" fill="none" stroke="#FF8A00" stroke-opacity="0.35" stroke-width="3"/>
  </g>

  <!-- Warning frame lines -->
  <g opacity="0.22">
    <path d="M220 250 H1380" stroke="#00F0FF" stroke-width="2"/>
    <path d="M220 650 H1380" stroke="#FF3AF2" stroke-width="2"/>
  </g>
</svg>
