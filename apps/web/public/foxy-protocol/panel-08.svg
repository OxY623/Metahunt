<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.55" stop-color="#0B0F1A"/>
      <stop offset="1" stop-color="#1A0B2A"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F0FF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FF3AF2" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg8)"/>

  <!-- Horizon -->
  <path d="M0 720 L0 900 L1600 900 L1600 740 C1200 700, 800 760, 0 720 Z" fill="#02040c"/>

  <!-- Neon gate -->
  <g filter="url(#glow)" opacity="0.9">
    <path d="M800 240 C980 320, 1060 520, 800 660 C540 520, 620 320, 800 240 Z" fill="none" stroke="url(#gate)" stroke-width="8" stroke-opacity="0.65"/>
    <path d="M800 280 C940 350, 1000 500, 800 610 C600 500, 660 350, 800 280 Z" fill="none" stroke="#00F0FF" stroke-width="3" stroke-opacity="0.35"/>
  </g>

  <!-- Fox silhouette -->
  <g transform="translate(760 650)" filter="url(#glow)">
    <path d="M40 0 L62 28 L90 8 L82 44 L110 70 L78 70 L68 102 L48 76 L20 92 L28 60 L6 40 L38 38 Z" fill="#FF3AF2" fill-opacity="0.22"/>
    <path d="M44 10 L58 28 L76 16 L72 40 L88 56 L70 56 L64 74 L52 60 L34 70 L38 50 L26 40 L44 38 Z" fill="#00F0FF" fill-opacity="0.12"/>
  </g>

  <!-- Callout scanline -->
  <g opacity="0.18">
    <rect x="0" y="420" width="1600" height="2" fill="#00F0FF"/>
    <rect x="0" y="540" width="1600" height="2" fill="#FF3AF2"/>
  </g>
</svg>
