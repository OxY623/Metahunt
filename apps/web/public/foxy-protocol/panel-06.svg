<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.55" stop-color="#0B0F1A"/>
      <stop offset="1" stop-color="#170826"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg6)"/>

  <!-- Terminal -->
  <rect x="240" y="170" width="1120" height="560" rx="26" fill="#060B16" stroke="#222B45" stroke-width="2"/>
  <rect x="280" y="220" width="1040" height="460" rx="18" fill="#0B0F1A" stroke="#00F0FF" stroke-opacity="0.25"/>

  <g font-family="JetBrains Mono, monospace" font-size="46" filter="url(#glow)">
    <text x="360" y="390" fill="#00F0FF" fill-opacity="0.9">NEW USER CONNECTED</text>
  </g>

  <!-- Foxy facing terminal -->
  <g transform="translate(1180 520)" filter="url(#glow)">
    <path d="M40 0 L58 22 L80 6 L74 36 L96 56 L70 56 L62 82 L46 60 L24 72 L30 48 L12 32 L38 30 Z" fill="#FF3AF2" fill-opacity="0.18"/>
    <path d="M44 8 L56 22 L72 12 L68 34 L82 48 L66 48 L60 64 L48 50 L34 58 L38 42 L26 32 L42 30 Z" fill="#00F0FF" fill-opacity="0.1"/>
    <circle cx="58" cy="46" r="6" fill="#FF8A00" fill-opacity="0.6"/>
  </g>

  <!-- Scanlines -->
  <g opacity="0.18">
    <rect x="0" y="260" width="1600" height="2" fill="#00F0FF"/>
    <rect x="0" y="460" width="1600" height="2" fill="#FF3AF2"/>
    <rect x="0" y="660" width="1600" height="2" fill="#00F0FF"/>
  </g>
